<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Invitation Flow Wireframes</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet" />
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root{
    --paper: oklch(0.985 0.004 95);
    --paper-2: oklch(0.965 0.006 95);
    --ink: oklch(0.30 0.012 60);
    --ink-soft: oklch(0.52 0.012 60);
    --ink-faint: oklch(0.68 0.01 70);
    --line: oklch(0.87 0.006 80);
    --line-2: oklch(0.78 0.01 70);
    --box: #ffffff;
    --box-alt: oklch(0.97 0.005 90);
    --accent: #AFE67E;
    --on-accent: #20300e;
    --accent-ink: color-mix(in oklab, var(--accent) 60%, #14210a);
    --accent-soft: color-mix(in oklab, var(--accent) 22%, var(--paper));
    --ok: oklch(0.58 0.11 150);
    --ok-soft: oklch(0.95 0.04 150);
    --warn: oklch(0.72 0.13 70);
    --warn-soft: oklch(0.96 0.05 80);
    --radius: 9px;
    --mono: "DM Mono", ui-monospace, monospace;
    --sans: "Pretendard", system-ui, sans-serif;
  }
  *{ box-sizing:border-box; }
  html,body{ margin:0; }
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:var(--sans);
    -webkit-font-smoothing:antialiased;
    line-height:1.45;
    word-break:keep-all;
    text-wrap:pretty;
  }
  ::selection{ background:var(--accent-soft); }

  /* ---------- top bar / tabs ---------- */
  .topbar{
    position:sticky; top:0; z-index:50;
    background:color-mix(in okl ab, var(--paper) 85%, transparent);
    backdrop-filter:blur(8px);
    border-bottom:1px solid var(--line);
    padding:14px 22px 0;
  }
  .brand{ display:flex; align-items:baseline; gap:12px; flex-wrap:wrap; }
  .brand h1{ font-size:17px; font-weight:700; margin:0; letter-spacing:-0.01em; }
  .brand .sub{ font-family:var(--mono); font-size:11px; color:var(--ink-faint); text-transform:uppercase; letter-spacing:0.04em; }
  .tabs{ display:flex; gap:4px; margin-top:12px; flex-wrap:wrap; }
  .tab{
    appearance:none; border:none; background:none; cursor:pointer;
    font-family:var(--sans); font-size:13.5px; font-weight:600; color:var(--ink-soft);
    padding:9px 14px; border-radius:8px 8px 0 0; position:relative;
    display:flex; align-items:center; gap:8px;
  }
  .tab .num{ font-family:var(--mono); font-size:10px; color:var(--ink-faint); border:1px solid var(--line-2); border-radius:4px; padding:1px 4px; }
  .tab:hover{ color:var(--ink); background:var(--paper-2); }
  .tab.active{ color:var(--accent-ink); }
  .tab.active .num{ color:var(--accent); border-color:var(--accent); }
  .tab.active::after{ content:""; position:absolute; left:8px; right:8px; bottom:-1px; height:2.5px; background:var(--accent); border-radius:2px; }
  .tab-div{ align-self:center; display:flex; align-items:center; gap:7px; margin:0 6px 0 10px; font-family:var(--mono); font-size:9px; letter-spacing:0.08em; color:var(--ink-faint); }
  .tab-div-line{ width:1px; height:18px; background:var(--line-2); display:block; }
  .tab.altb{ color:var(--ink-soft); }
  .tab.altb .num{ background:var(--ink); color:#fff; border-color:var(--ink); }
  .tab.altb.active{ color:var(--ink); }
  .tab.altb.active .num{ background:var(--accent); color:var(--on-accent); border-color:var(--accent); }
  .tab.altb.active::after{ background:var(--ink); }

  /* ---------- board ---------- */
  .board{ padding:30px 26px 90px; max-width:1500px; margin:0 auto; }
  .board-head{ margin-bottom:8px; }
  .board-head h2{ font-size:22px; font-weight:700; margin:0 0 6px; letter-spacing:-0.015em; }
  .board-head p{ margin:0; color:var(--ink-soft); font-size:14px; max-width:760px; }
  .legend{ display:flex; gap:16px; flex-wrap:wrap; margin:18px 0 26px; font-size:12px; color:var(--ink-soft); }
  .legend span{ display:inline-flex; align-items:center; gap:7px; }
  .sw{ width:22px; height:13px; border-radius:4px; border:1.5px solid var(--line-2); display:inline-block; }
  .sw.vvip{ background:var(--accent-soft); border-color:var(--accent); }
  .sw.vip{ border-color:var(--ink); border-style:solid; }
  .sw.reg{ border-color:var(--ink-soft); border-style:dashed; }

  .section-label{ font-family:var(--mono); font-size:11px; text-transform:uppercase; letter-spacing:0.06em; color:var(--ink-faint); margin:34px 0 14px; display:flex; align-items:center; gap:10px; }
  .section-label::after{ content:""; flex:1; height:1px; background:var(--line); }

  /* ---------- horizontal strip ---------- */
  .strip{ display:flex; align-items:flex-start; gap:6px; overflow-x:auto; padding:6px 2px 20px; }
  .strip::-webkit-scrollbar{ height:9px; }
  .strip::-webkit-scrollbar-thumb{ background:var(--line-2); border-radius:9px; }
  .arrow{ flex:0 0 auto; align-self:center; color:var(--ink-faint); font-size:20px; margin-top:-22px; user-select:none; }

  /* ---------- phone ---------- */
  .phone-wrap{ flex:0 0 auto; display:flex; flex-direction:column; gap:9px; width:226px; }
  .phone{
    width:226px; height:452px; background:var(--box);
    border:2px solid var(--ink); border-radius:30px; padding:8px;
    display:flex; flex-direction:column; box-shadow:0 1px 0 var(--line-2);
    position:relative;
  }
  .statusbar{ display:flex; justify-content:space-between; align-items:center; font-family:var(--mono); font-size:9px; color:var(--ink-faint); padding:3px 12px 5px; }
  .statusbar .sb-dots{ display:flex; gap:3px; }
  .statusbar .sb-dots i{ width:4px; height:4px; border-radius:50%; background:var(--ink-faint); display:block; }
  .phone-screen{ flex:1; border-radius:22px; background:var(--paper); border:1px solid var(--line); overflow:hidden; display:flex; flex-direction:column; }
  .app.frame-soft .phone{ border-color:var(--line-2); border-width:1.5px; }
  .navbar{ height:4px; width:80px; background:var(--ink-faint); border-radius:4px; margin:6px auto 2px; opacity:.5; }
  .caption{ font-size:12px; color:var(--ink-soft); padding:0 4px; }
  .caption b{ color:var(--ink); font-weight:600; display:block; font-size:12.5px; }
  .caption i{ font-style:normal; font-family:var(--mono); font-size:10px; color:var(--ink-faint); }
  .caption .step{ font-family:var(--mono); font-size:10px; color:var(--accent); margin-right:6px; }

  /* screen interior */
  .scr{ padding:11px; display:flex; flex-direction:column; gap:9px; flex:1; overflow:hidden; }
  .scr.center{ justify-content:center; align-items:center; text-align:center; gap:12px; }
  .scr.pad0{ padding:0; }
  .appbar{ display:flex; align-items:center; gap:8px; padding:9px 11px; border-bottom:1px solid var(--line); font-size:12px; font-weight:600; white-space:nowrap; }
  .appbar > span:first-of-type{ overflow:hidden; text-overflow:ellipsis; }
  .appbar .back{ color:var(--ink-faint); font-family:var(--mono); }
  .appbar .right{ margin-left:auto; color:var(--ink-faint); font-size:11px; font-weight:500; white-space:nowrap; flex:0 0 auto; }
  h3.t{ font-size:15px; font-weight:700; margin:0; letter-spacing:-0.01em; }
  .lead{ font-size:12px; color:var(--ink-soft); margin:0; }
  .tiny{ font-size:10.5px; color:var(--ink-faint); margin:0; }
  .mono{ font-family:var(--mono); }

  .btn{ background:var(--accent); color:var(--on-accent); border-radius:8px; padding:10px; text-align:center; font-size:12px; font-weight:700; white-space:nowrap; }
  .btn.ghost{ background:none; color:var(--ink); border:1.5px solid var(--line-2); }
  .btn.dark{ background:var(--ink); color:#fff; }
  .btn.sm{ padding:7px 10px; font-size:11px; }
  .field{ border:1.5px solid var(--line-2); border-radius:8px; padding:9px 10px; font-size:11.5px; color:var(--ink-faint); background:var(--box); }
  .field.filled{ color:var(--ink); }
  .card{ border:1.5px solid var(--line); border-radius:10px; background:var(--box); padding:10px; display:flex; flex-direction:column; gap:7px; }
  .card.flat{ background:var(--box-alt); }
  .row{ display:flex; align-items:center; gap:9px; }
  .row.between{ justify-content:space-between; }
  .col{ display:flex; flex-direction:column; gap:7px; }
  .grow{ flex:1; }
  .avatar{ width:34px; height:34px; border-radius:50%; background:var(--box-alt); border:1.5px solid var(--line-2); flex:0 0 auto; }
  .avatar.sm{ width:24px; height:24px; }
  .chip{ display:inline-flex; align-items:center; gap:5px; font-size:10px; font-weight:600; padding:3px 8px; border-radius:20px; border:1.5px solid var(--line-2); color:var(--ink-soft); background:var(--box); width:max-content; white-space:nowrap; flex:0 0 auto; }
  .hscroll{ overflow-x:auto; scrollbar-width:none; -ms-overflow-style:none; }
  .hscroll::-webkit-scrollbar{ display:none; }
  .chip.live{ color:var(--on-accent); background:var(--accent); border-color:var(--accent); }
  .chip.ok{ color:var(--ok); background:var(--ok-soft); border-color:transparent; }
  .chip.warn{ color:oklch(0.5 0.12 70); background:var(--warn-soft); border-color:transparent; }
  .dot{ width:6px; height:6px; border-radius:50%; background:currentColor; display:inline-block; }

  .thumb{ border-radius:9px; border:1.5px solid var(--line); position:relative; overflow:hidden;
    background:
      repeating-linear-gradient(45deg, var(--line) 0 1.5px, transparent 1.5px 11px),
      var(--box-alt);
    display:flex; align-items:center; justify-content:center; }
  .thumb span{ font-family:var(--mono); font-size:9.5px; color:var(--ink-faint); background:var(--paper); padding:2px 6px; border-radius:4px; border:1px solid var(--line); }

  .bubble{ background:var(--box); border:1.5px solid var(--line); border-radius:4px 12px 12px 12px; padding:8px 9px; font-size:11px; max-width:88%; }
  .bubble.me{ background:var(--accent-soft); border-color:transparent; align-self:flex-end; border-radius:12px 4px 12px 12px; }
  .linkcard{ border:1.5px solid var(--line); border-radius:9px; overflow:hidden; background:var(--box); }
  .toast{ position:absolute; left:10px; right:10px; border-radius:9px; background:var(--ink); color:#fff; padding:8px 10px; font-size:11px; display:flex; align-items:center; gap:8px; box-shadow:0 6px 18px rgba(0,0,0,.18); }
  .listrow{ display:flex; align-items:center; gap:9px; padding:8px 2px; border-bottom:1px solid var(--line); font-size:11.5px; }
  .check{ width:18px; height:18px; border-radius:50%; border:1.5px solid var(--line-2); flex:0 0 auto; }
  .check.on{ border-color:var(--accent); background:var(--accent); }
  .plan{ border:1.5px solid var(--line-2); border-radius:9px; padding:9px 10px; display:flex; flex-direction:column; gap:3px; }
  .plan.sel{ border-color:var(--accent); background:var(--accent-soft); }
  .plan .price{ font-size:14px; font-weight:700; }

  .searchbar{ display:flex; align-items:center; gap:7px; border:1.5px solid var(--line-2); border-radius:9px; padding:8px 10px; font-size:11.5px; color:var(--ink-faint); background:var(--box); white-space:nowrap; }
  .seg{ display:flex; border:1.5px solid var(--line-2); border-radius:9px; padding:3px; gap:3px; background:var(--box); }
  .seg-opt{ flex:1; text-align:center; font-size:11px; font-weight:700; color:var(--ink-soft); padding:6px 4px; border-radius:6px; }
  .seg-opt.sel{ background:var(--accent); color:var(--on-accent); }
  .searchbar .si{ font-size:14px; color:var(--ink-soft); }
  .userrow{ display:flex; align-items:center; gap:9px; padding:7px 2px; border-bottom:1px solid var(--line); }
  .un{ font-size:12px; font-weight:600; color:var(--ink); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .uh{ font-size:10px; color:var(--ink-faint); font-family:var(--mono); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .orline{ display:flex; align-items:center; gap:8px; font-size:10px; color:var(--ink-faint); font-family:var(--mono); margin:1px 0; }
  .orline::before, .orline::after{ content:""; flex:1; height:1px; background:var(--line); }
  .btn .soc{ display:inline-flex; align-items:center; justify-content:center; width:15px; height:15px; border-radius:3px; font-family:var(--mono); font-size:10px; margin-right:6px; vertical-align:-2px; }
  .btn .soc.g{ background:#fff; border:1px solid var(--line-2); color:#3367d6; }
  .btn .soc.a{ background:var(--ink); }
  .sharesheet{ display:flex; gap:6px; }
  .sharebtn{ flex:1; display:flex; flex-direction:column; align-items:center; gap:5px; font-size:9.5px; color:var(--ink-soft); text-align:center; }
  .sharebtn .sicon{ width:40px; height:40px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-family:var(--mono); font-size:12px; font-weight:600; color:var(--ink-soft); background:var(--box-alt); border:1px solid var(--line); }
  .sharebtn .sicon.wa{ color:#0a6b4d; background:oklch(0.93 0.06 160); border-color:transparent; }
  .sharebtn .sicon.ig{ color:#9b2a6b; background:oklch(0.93 0.05 350); border-color:transparent; }
  .sharesheet.compact .sharebtn{ font-size:9px; }
  .sharesheet.compact .sicon{ width:33px; height:33px; font-size:11px; }
  /* B-flow: let ticket status chips wrap instead of overflowing the 185px card */
  .ticket .perf .chip{ white-space:normal; max-width:100%; height:auto; line-height:1.25; }

  /* ticket */
  .ticket{ border:1.5px solid var(--accent); border-radius:11px; background:var(--box); overflow:hidden; position:relative; flex:0 0 auto; }
  .ticket .top{ padding:10px 11px; display:flex; flex-direction:column; gap:4px; }
  .ticket .perf{ border-top:1.5px dashed var(--line-2); padding:9px 11px; display:flex; align-items:center; gap:9px; }
  .ticket .qr{ width:48px; height:48px; flex:0 0 auto; border-radius:6px; border:1.5px solid var(--accent);
    background:
      conic-gradient(from 0deg, var(--ink) 25%, #fff 0 50%, var(--ink) 0 75%, #fff 0) 0 0/12px 12px; }
  .ticket.vvip{ border-color:var(--accent); }
  .ticket.vvip .perf{ border-color:var(--accent); }
  .ticket.vvip .qr{ border-color:var(--accent); }
  .ticket.expired{ opacity:.6; }
  .ticket.expired::after{ content:"USED"; position:absolute; top:13px; right:-29px; width:104px; text-align:center; transform:rotate(45deg); background:var(--ink-soft); color:#fff; font-family:var(--mono); font-size:8.5px; padding:2px 0; letter-spacing:0.12em; line-height:1.4; }
  .ticket.compact{ flex:0 0 auto; }
  .passtoggle{ font-family:var(--mono); font-size:8.5px; font-weight:700; letter-spacing:0.03em; padding:4px 5px; border-radius:6px; border:1.5px solid var(--line-2); color:var(--ink-faint); background:var(--box); white-space:nowrap; flex:0 0 auto; }
  .passtoggle.on{ border-color:var(--accent); background:var(--accent); color:var(--on-accent); }
  .passtoggle.dis{ opacity:.32; }
  .addchip{ font-family:var(--mono); font-size:10px; font-weight:700; padding:4px 7px; border-radius:7px; border:1.5px solid var(--accent); background:var(--accent-soft); color:var(--accent-ink); white-space:nowrap; flex:0 0 auto; display:inline-flex; align-items:center; gap:3px; line-height:1; }
  .justsent{ position:absolute; top:-6px; right:8px; z-index:2; font-family:var(--mono); font-size:8px; font-weight:700; letter-spacing:0.06em; color:var(--on-accent); background:var(--accent); padding:2px 6px; border-radius:5px; }

  .tier-badge{ font-size:9.5px; font-weight:700; font-family:var(--mono); letter-spacing:0.04em; padding:2px 7px; border-radius:5px; width:max-content; white-space:nowrap; }
  .tier-badge.vvip{ background:var(--accent); color:var(--on-accent); }
  .tier-badge.vip{ background:var(--ink); color:#fff; }
  .tier-badge.reg{ background:none; color:var(--ink-soft); border:1.5px dashed var(--line-2); }
  .tier-badge.room{ background:var(--box-alt); color:var(--ink); border:1.5px solid var(--line-2); }

  /* room invite ticket — neutral, distinct from the green free platform ticket */
  .ticket.roomticket{ border-color:var(--line-2); }
  .ticket.roomticket .perf{ border-color:var(--line-2); }
  .ticket.roomticket .qr{ border-color:var(--line-2);
    background:
      conic-gradient(from 0deg, var(--ink-soft) 25%, #fff 0 50%, var(--ink-soft) 0 75%, #fff 0) 0 0/12px 12px; }
  .ticket.roomticket .ticket-howto{ border-color:var(--line-2); }
  .ticket.roomticket .ticket-howto .th-steps li::before{ background:var(--ink-soft); color:#fff; }

  /* ---------- logic flow ---------- */
  .flow{ display:flex; flex-direction:column; gap:0; }
  .lane{ display:grid; grid-template-columns:84px 1fr; border-top:1px dashed var(--line-2); }
  .lane:last-child{ border-bottom:1px dashed var(--line-2); }
  .lane-label{ font-family:var(--mono); font-size:11px; text-transform:uppercase; letter-spacing:0.05em; color:var(--ink-faint); padding:22px 0 0; position:sticky; left:0; }
  .lane-body{ padding:20px 8px 28px; display:flex; align-items:flex-start; gap:10px; flex-wrap:wrap; }
  .node{ border:1.5px solid var(--line-2); border-radius:10px; background:var(--box); padding:11px 13px; min-width:140px; max-width:185px; display:flex; flex-direction:column; gap:3px; position:relative; }
  .node .nt{ font-size:13px; font-weight:700; letter-spacing:-0.01em; }
  .node .nd{ font-size:11px; color:var(--ink-soft); }
  .node.host{ background:oklch(0.97 0.02 285); border-color:oklch(0.82 0.05 285); }
  .node.sys{ background:oklch(0.97 0.025 175); border-color:oklch(0.8 0.05 175); }
  .node.guest{ background:oklch(0.975 0.02 130); border-color:oklch(0.8 0.05 130); }
  .node.action{ background:var(--accent-soft); border-color:var(--accent); }
  .node.gate{ background:var(--box); border:2px dashed var(--ink-soft); }
  .conn{ flex:0 0 auto; align-self:center; color:var(--ink-faint); font-size:17px; }
  .branchset{ display:flex; flex-direction:column; gap:9px; }
  .branchset .blab{ font-family:var(--mono); font-size:10px; color:var(--ink-faint); }
  .gatewrap{ display:flex; align-items:stretch; gap:10px; flex-wrap:wrap; }
  .gatecol{ display:flex; flex-direction:column; gap:7px; border-left:2px solid var(--line); padding-left:11px; min-width:200px; }
  .gatecol .gh{ display:flex; align-items:center; gap:7px; font-size:12px; font-weight:700; white-space:nowrap; }
  .gatecol.vvip{ border-color:var(--accent); }
  .gatecol.vip{ border-color:var(--ink); }
  .gatecol.reg{ border-color:var(--ink-soft); border-left-style:dashed; }
  .gstep{ font-size:11px; color:var(--ink-soft); display:flex; gap:6px; align-items:baseline; line-height:1.4; }
  .gstep .gi{ font-family:var(--mono); font-size:9px; color:var(--ink-faint); flex:0 0 auto; }
  .gstep .gt{ flex:1; min-width:0; }

  .edge-note{ border:1.5px solid var(--warn); background:var(--warn-soft); border-radius:8px; padding:8px 10px; font-size:11px; color:oklch(0.42 0.1 70); max-width:200px; }
  .edge-note b{ display:block; font-size:11px; color:oklch(0.45 0.13 60); margin-bottom:2px; }

  /* ---------- branching flow graph (measured SVG) ---------- */
  .flow-intro{ font-size:13px; color:var(--ink-soft); margin:0 0 14px; max-width:780px; }
  .section-label .ph-n{ font-family:var(--mono); font-weight:700; color:var(--accent-ink); background:var(--accent-soft); border:1px solid var(--accent); border-radius:5px; padding:1px 6px; font-size:10px; }

  .fg-key{ display:flex; flex-wrap:wrap; align-items:center; gap:8px 16px; font-size:11.5px; color:var(--ink-soft); margin:6px 0 22px; }
  .fg-key span{ display:inline-flex; align-items:center; gap:7px; }
  .fg-key .kgroup{ font-family:var(--mono); font-size:10px; text-transform:uppercase; letter-spacing:0.05em; color:var(--ink-faint); }
  .fg-key .kdiv{ width:1px; height:15px; background:var(--line-2); padding:0; }
  .fg-key .kn{ width:16px; height:14px; border-radius:4px; border:1.5px solid var(--line-2); background:var(--box); display:inline-block; flex:0 0 auto; }
  .fg-key .kn.decision{ background:#fff; border:2px solid var(--ink-soft); border-radius:8px; }
  .fg-key .kn.action{ background:var(--accent-soft); border-color:var(--accent); }
  .fg-key .kn.exc{ background:var(--warn-soft); border-color:var(--warn); }
  .fg-key .ke{ width:20px; height:0; display:inline-block; flex:0 0 auto; }
  .fg-key .ke.seq{ border-top:2px solid var(--line-2); }
  .fg-key .ke.ok{ border-top:2px solid var(--accent-ink); }
  .fg-key .ke.exc{ border-top:2px dashed var(--warn); }

  .fg-scroll{ overflow-x:auto; padding:4px 2px 30px; margin-bottom:6px; }
  .fg-scroll::-webkit-scrollbar{ height:9px; }

  <script type="text/babel" data-src="wf-logic.jsx">
// ---------- wf-logic.jsx : Board 1, swimlane branching logic flow ----------
// Actors (Host / System / Guest) are separated into horizontal LANES — not by
// node color. Time flows left→right; the path hands off DOWN between lanes.
// Edge cases (⚠) sit inline on their own branch within the relevant lane.

// ---- generic measured swimlane flow-graph ----------------------------------
// lane: { id, label }
// node: { id, lane, sub, col, kind, t, d }   sub = stack row within the lane
// edge: [from, to, label, type]              type = "seq" | "ok" | "exc"
const LABELW = 92;

function FlowGraph({ lanes, nodes, edges, colW = 182, gap = 30, rowGap = 14 }) {
  const wrapRef = React.useRef(null);
  const refs = React.useRef({});
  const [paths, setPaths] = React.useState([]);
  const COLS = nodes.reduce((m, n) => Math.max(m, n.col), 0);

  // lane geometry
  const laneH = {};
  lanes.forEach((l) => {
    laneH[l.id] = 1 + nodes.filter((n) => n.lane === l.id).reduce((m, n) => Math.max(m, n.sub || 0), 0);
  });
  const laneStart = {};
  let acc = 0;
  lanes.forEach((l) => { laneStart[l.id] = acc; acc += laneH[l.id]; });
  const ROWS = acc;
  const absRow = (n) => laneStart[n.lane] + (n.sub || 0) + 1;

  React.useLayoutEffect(() => {
    const cont = wrapRef.current;
    if (!cont) return;
    const measure = () => {
      const cb = cont.getBoundingClientRect();
      const rect = (id) => {
        const el = refs.current[id];
        if (!el) return null;
        const b = el.getBoundingClientRect();
        return { l: b.left - cb.left, t: b.top - cb.top, w: b.width, h: b.height };
      };
      const out = [];
      edges.forEach(([a, b, label, type]) => {
        const A = rect(a), B = rect(b);
        if (!A || !B) return;
        const ax = A.l + A.w, ay = A.t + A.h / 2;
        const bx = B.l, by = B.t + B.h / 2;
        const riser = ax + Math.min(gap * 0.5, 16);
        const straight = Math.abs(ay - by) < 1.5;
        const d = straight
          ? `M ${ax} ${ay} H ${bx}`
          : `M ${ax} ${ay} H ${riser} V ${by} H ${bx}`;
        const lx = straight ? ax + (bx - ax) * 0.42 : riser + 5;
        const ly = straight ? ay - 6 : ay + (by - ay) * 0.34 - 2;
        out.push({ d, label, type: type || "seq", lx, ly, straight });
      });
      setPaths(out);
    };
    measure();
    const t = setTimeout(measure, 360);
    let ro;
    if (typeof ResizeObserver !== "undefined") { ro = new ResizeObserver(measure); ro.observe(cont); }
    window.addEventListener("resize", measure);
    return () => { clearTimeout(t); if (ro) ro.disconnect(); window.removeEventListener("resize", measure); };
  }, [lanes, nodes, edges, colW, gap, rowGap]);

  return (
    <div className="fg-scroll">
      <div className="fg" ref={wrapRef} style={{
        gridTemplateColumns: `${LABELW}px repeat(${COLS}, ${colW}px)`,
        gridTemplateRows: `repeat(${ROWS}, minmax(54px, auto))`,
        columnGap: gap, rowGap,
      }}>
        {lanes.map((l, i) => (
          <div key={l.id} className={"fg-band" + (i > 0 ? " div" : "")}
            style={{ gridColumn: "1 / -1", gridRow: `${laneStart[l.id] + 1} / ${laneStart[l.id] + laneH[l.id] + 1}` }}>
            <span className="fg-lane">{l.label}</span>
          </div>
        ))}

        <svg className="fg-svg fg-edges">
          <defs>
            {[["seq", "var(--line-2)"], ["ok", "var(--accent-ink)"], ["exc", "var(--warn)"]].map(([k, c]) => (
              <marker key={k} id={"fg-ar-" + k} markerWidth="9" markerHeight="9" refX="7" refY="4.5"
                orient="auto" markerUnits="userSpaceOnUse">
                <path d="M1 1 L7.5 4.5 L1 8 Z" fill={c} />
              </marker>
            ))}
          </defs>
          {paths.map((e, i) => (
            <path key={i} className={"fg-edge " + e.type} d={e.d} markerEnd={`url(#fg-ar-${e.type})`} />
          ))}
        </svg>

        {nodes.map((n) => (
          <div key={n.id} ref={(el) => (refs.current[n.id] = el)}
            className={"node " + (n.kind || "")}
            style={{ gridColumn: n.col + 1, gridRow: absRow(n) }}>
            <div className="nt">{n.t}</div>
            {n.d && <div className="nd">{n.d}</div>}
          </div>
        ))}

        <svg className="fg-svg fg-labels">
          {paths.map((e, i) => e.label ? (
            <text key={i} className={"fg-elabel " + e.type} x={e.lx} y={e.ly}
              textAnchor={e.straight ? "middle" : "start"}>{e.label}</text>
          ) : null)}
        </svg>
      </div>
    </div>
  );
}

const LANES_HSG = [{ id: "host", label: "Host" }, { id: "system", label: "System" }, { id: "guest", label: "Guest" }];
const LANES_SG = [{ id: "system", label: "System" }, { id: "guest", label: "Guest" }];

// ---- Phase A : invite → delivery → open ------------------------------------
const A_NODES = [
  { id: "live",    lane: "host",   sub: 0, col: 1, kind: "",        t: "Live in progress", d: "Host broadcasting" },
  { id: "invite",  lane: "host",   sub: 0, col: 2, kind: "",        t: "Pick tier", d: "Step 1 · VVIP / Regular" },

          <b> server</b> the source of truth and write the <b>invite → account binding early</b>, then offer durable ways back.

      <div className="section-label">The binding point — where loss is survivable</div>

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    // Same-window signal so in-page listeners (deck-stage rail thumbnails)
    // can react — the parent message only reaches the host, not peers.
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-omelette-chrome=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">
          {children}
        </div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  // Segments wrap mid-word once per-segment width runs out. The track is
  // ~248px (280 panel − 28 body pad − 4 seg pad), each button loses 12px
  // to its own padding, and 11.5px system-ui averages ~6.3px/char — so 2
  // options fit ~16 chars each, 3 fit ~10. Past that (or >3 options), fall
  // back to a dropdown rather than wrap.
  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);
  if (!fitsAsSegments) {
    // <select> emits strings — map back to the original option value so the
    // fallback stays type-preserving (numbers, booleans) like the segment path.
    const resolve = (s) => {
      const m = options.find((o) => String(typeof o === 'object' ? o.value : o) === s);
      return m === undefined ? s : typeof m === 'object' ? m.value : m;
    };
    return <TweakSelect label={label} value={value} options={options}
                        onChange={(s) => onChange(resolve(s))} />;
  }
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

// Relative-luminance contrast pick — checkmarks drawn over a swatch need to
// read on both #111 and #fafafa without per-option configuration. Hex input
// only (#rgb / #rrggbb); named or rgb()/hsl() colors fall through to "light".
function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

const __TwkCheck = ({ light }) => (
  <svg viewBox="0 0 14 14" aria-hidden="true">
    <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2"
          strokeLinecap="round" strokeLinejoin="round"
          stroke={light ? 'rgba(0,0,0,.78)' : '#fff'} />

);

// TweakColor — curated color/palette picker. Each option is either a single
// hex string or an array of 1-5 hex strings; the card adapts — a lone color
// renders solid, a palette renders colors[0] as the hero (left ~2/3) with the
// rest stacked in a sharp column on the right. onChange emits the
// option in the shape it was passed (string stays string, array stays array).
// Without options it falls back to the native color input for back-compat.
function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" className="twk-swatch" value={value}
               onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  // Native <input type=color> emits lowercase hex per the HTML spec, so
  // compare case-insensitively. String() guards JSON.stringify(undefined),
  // which returns the primitive undefined (no .toLowerCase).
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const sup = rest.slice(0, 4);
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio"
                    aria-checked={on} data-on={on ? '1' : '0'}
                    aria-label={colors.join(', ')} title={colors.join(' · ')}
                    style={{ background: hero }}
                    onClick={() => onChange(o)}>
              {sup.length > 0 && (
                <span>
                  {sup.map((c, j) => <i key={j} style={{ background: c }} />)}
                </span>
              )}
              {on && <__TwkCheck light={__twkIsLight(hero)} />}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

</script>
  <script type="text/babel" data-src="wf-app.jsx">
// ---------- wf-app.jsx : tab shell + tweaks ----------
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accent": "#AFE67E",
  "frame": "soft"
}/*EDITMODE-END*/;

const TABS = [
  { id: "logic", label: "Logic Flow", Comp: window.LogicFlow },
  { id: "host", label: "Host Screens", Comp: window.HostScreens },
  { id: "guest", label: "Invitee Screens", Comp: window.GuestFlow },
  { id: "edge", label: "Edge Cases", Comp: window.EdgeCases },
  { id: "recovery", label: "Recovery", Comp: window.Recovery },
  { id: "proposal", label: "Approved", Comp: window.Proposal, group: "B" },
];

// pick legible text color (dark/white) for a given accent hex
function readableOn(hex) {
  const c = (hex || "").replace("#", "");
  if (c.length < 6) return "#20300e";
  const r = parseInt(c.substr(0, 2), 16) / 255;
  const g = parseInt(c.substr(2, 2), 16) / 255;
  const b = parseInt(c.substr(4, 2), 16) / 255;
  const lin = (x) => (x <= 0.03928 ? x / 12.92 : Math.pow((x + 0.055) / 1.055, 2.4));
  const L = 0.2126 * lin(r) + 0.7152 * lin(g) + 0.0722 * lin(b);
  return L > 0.45 ? "#1c2b0c" : "#ffffff";
}

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);

  React.useEffect(() => {
    const root = document.documentElement;
    root.style.setProperty("--accent", t.accent);
    root.style.setProperty("--on-accent", readableOn(t.accent));
  }, [t.accent]);

  const initial = (location.hash || "").replace("#", "") || "logic";
  const [active, setActive] = useState(TABS.find((x) => x.id === initial) ? initial : "logic");
  const go = (id) => { setActive(id); history.replaceState(null, "", "#" + id); window.scrollTo({ top: 0 }); };
  const Current = (TABS.find((x) => x.id === active) || TABS[0]).Comp;

  return (
    <div className={"app frame-" + t.frame}>
      <div className="topbar">
        <div className="brand">
          <h1>Invite → Entry Flow</h1>
          <span className="sub">streaming app · wireframe · android</span>
        </div>
        <div className="tabs">
          {TABS.map((tab, i) => (
            <React.Fragment key={tab.id}>
              {tab.group === "B" && (
                <span className="tab-div" title="Separate proposal"><span className="tab-div-line" />ALT</span>
              )}
              <button className={"tab" + (active === tab.id ? " active" : "") + (tab.group === "B" ? " altb" : "")} onClick={() => go(tab.id)}>
                <span className="num">{tab.group === "B" ? "B" : String(i + 1).padStart(2, "0")}</span>{tab.label}
              </button>
            </React.Fragment>
          ))}
        </div>
      </div>
      <Current />

      <TweaksPanel>
        <TweakSection label="Brand" />
        <TweakColor
          label="Point color"
          value={t.accent}
          options={["#AFE67E", "#E8694A", "#5B8DEF", "#C58AF9", "#F2B705"]}
          onChange={(v) => setTweak("accent", v)}
        />
        <TweakSection label="Wireframe" />
        <TweakRadio
          label="Phone frame"
          value={t.frame}
          options={["soft", "solid"]}
          onChange={(v) => setTweak("frame", v)}
        />
      </TweaksPanel>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

</script>
</body>
